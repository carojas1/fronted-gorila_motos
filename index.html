<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gorila Motos — Sistema interno de gestión del taller" />
    <title>Gorila Motos · Acceso</title>
    <!-- Tema (claro/oscuro) aplicado ANTES de renderizar para evitar parpadeo -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('gm_theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t);
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <!-- Detector de errores de arranque (script clásico: corre aunque el módulo falle al parsear) -->
    <script>
      (function () {
        function show(msg) {
          try {
            var el = document.getElementById('boot-error');
            if (!el) {
              el = document.createElement('pre');
              el.id = 'boot-error';
              el.style.cssText = 'position:fixed;inset:0;z-index:999999;margin:0;padding:16px;background:#0C0C10;color:#FF6470;font:12px/1.5 monospace;white-space:pre-wrap;overflow:auto;';
              (document.body || document.documentElement).appendChild(el);
            }
            el.textContent = 'Gorila Motos — error al cargar:\n\n' + msg;
          } catch (e) {}
        }
        window.addEventListener('error', function (e) {
          show((e.message || 'Error') + '\n' + (e.filename || '') + ':' + (e.lineno || '') + ':' + (e.colno || ''));
        });
        window.addEventListener('unhandledrejection', function (e) {
          var r = e.reason; show('Promesa rechazada: ' + (r && (r.stack || r.message) ? (r.stack || r.message) : r));
        });
        window.addEventListener('load', function () {
          setTimeout(function () {
            var root = document.getElementById('root');
            if (root && root.childElementCount === 0 && !document.getElementById('boot-error')) {
              show('La app no se renderizó (root vacío tras 9s). Posible WebView incompatible o sin conexión al servidor.');
            }
          }, 9000);
        });
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Bebas+Neue&family=Dancing+Script:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
